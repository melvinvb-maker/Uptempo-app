<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>UPTEMPO</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#101018" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
.app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  padding:
    calc(25px + env(safe-area-inset-top))
    14px
    120px;
}</head>
<script>
let lastTouchEnd = 0;

document.addEventListener('touchend', function (event) {
  const now = Date.now();

  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }

  lastTouchEnd = now;
}, { passive: false });
</script><body>
<div class="app">
  <div class="top"><div class="brand">UPTEMPO</div></div>
  <main id="dashboard" class="screen active">
    <div class="hero"><div class="hero-card"><div class="label">Volgend festival</div><div id="nextName" class="h1">Nog niets gepland</div><div id="nextMeta" class="muted">Voeg je eerste festival toe</div><div class="count"><div><b id="cdD">00</b><span>Dagen</span></div><div><b id="cdH">00</b><span>Uur</span></div><div><b id="cdM">00</b><span>Min</span></div><div><b id="cdS">00</b><span>Sec</span></div></div></div></div>
    <div class="grid"><div class="stat"><b id="totalFest">0</b><br><span class="muted">Gepland</span></div><div class="stat"><b id="doneFest">0</b><br><span class="muted">Bezocht</span></div><div class="stat"><b id="friendCount">0</b><br><span class="muted">Vrienden</span></div></div>
    <div class="section">Aankomende festivals</div><div id="upcoming"></div>
  </main>
  <main id="calendar" class="screen"><div class="section">Kalender</div><div class="card"><div id="monthTitle" class="h1"></div><div class="cal" id="calendarGrid"></div></div></main>
  <main id="festivals" class="screen"><div class="section">Mijn Festivals</div><div class="form"><input id="search" placeholder="Zoek festival, locatie of genre..."></div><div id="festivalList"></div></main>
  <main id="stats" class="screen"><div class="section">Statistieken</div><div class="grid"><div class="stat"><b id="sPlanned">0</b><br><span class="muted">Gepland</span></div><div class="stat"><b id="sVisited">0</b><br><span class="muted">Bezocht</span></div><div class="stat"><b id="sCities">0</b><br><span class="muted">Locaties</span></div></div><div class="card"><b>Festivals per maand</b><div class="bar" id="bars"></div></div><div class="card"><b>Genres</b><div id="genreStats"></div></div></main>
  <main id="friends" class="screen"><div class="section">Vrienden</div><div class="notice" id="firebaseNotice">Live database staat klaar. Vul jouw Firebase-config in <b>firebase-config.js</b> in om live vrienden te gebruiken.</div><div class="card form"><input id="myName" placeholder="Jouw naam"><button class="btn" id="saveProfile">Profiel opslaan</button></div><div class="card form"><input id="friendName" placeholder="Naam vriend"><button class="btn" id="addFriend">Vriend toevoegen</button></div><div id="friendsList"></div></main>
</div>
<button class="fab" id="openAdd">+</button>
<nav class="tabs"><button class="tab active" data-tab="dashboard"><b>🏠</b>Dashboard</button><button class="tab" data-tab="calendar"><b>📅</b>Kalender</button><button class="tab" data-tab="festivals"><b>🎟️</b>Festivals</button><button class="tab" data-tab="stats"><b>📊</b>Stats</button><button class="tab" data-tab="friends"><b>👥</b>Vrienden</button></nav>
<div class="modal" id="modal"><div class="sheet"><div class="row" style="justify-content:space-between"><h2>Festival toevoegen</h2><button class="btn2" id="closeModal">Sluit</button></div><div class="form"><input id="fName" placeholder="Naam festival"><input id="fDate" type="date"><input id="fLocation" placeholder="Locatie"><select id="fGenre"><option>Uptempo</option><option>Hardstyle</option><option>House</option><option>Techno</option><option>Overig</option></select><textarea id="fNotes" placeholder="Notities"></textarea><button class="btn" id="saveFestival">Toevoegen</button></div></div></div>
<script type="module" src="app.js"></script>
<script src="firebase-config.js"></script></body>
</html>
